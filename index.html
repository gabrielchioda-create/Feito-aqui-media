<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiência Premium</title>
    <!-- Fonte minimalista e elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d4af37; /* Dourado suave/Premium */
            --primary-hover: #bda036;
            --text-light: #f8f8f8;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita rolagem na entrada */
            background-color: #050505;
        }

        /* --- BACKGROUND DINÂMICO E SUTIL --- */
        .bg-container {
            position: fixed;
            top: -5%; left: -5%; 
            width: 110vw; height: 110vh; /* Margem extra para o efeito parallax */
            z-index: -2;
            transition: transform 0.1s ease-out;
        }

        .bg-image {
            width: 100%; 
            height: 100%;
            /* Imagem de textura abstrata/dark premium */
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            /* Efeito Cinemagraph: Movimento de escala hiper-lento */
            animation: breathe 25s infinite alternate ease-in-out;
        }

        /* --- O "TOQUE LEVE": CAMADA DE FOCO (OVERLAY) --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            /* Gradiente radial: 30% escuro no centro, 85% escuro nas bordas */
            background: radial-gradient(circle at 50% 50%, rgba(10, 10, 10, 0.3) 0%, rgba(5, 5, 5, 0.85) 100%);
            /* Desfoque leve: não destrói a imagem, apenas suaviza */
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        /* --- CONTAINER PRINCIPAL --- */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            perspective: 1000px;
        }

        /* --- GLASSMORPHISM CARD (A MÁGICA ACONTECE AQUI) --- */
        .glass-card {
            background: rgba(20, 20, 20, 0.45);
            /* Desfoque forte apenas dentro do cartão */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4rem 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            
            /* Animação de Entrada */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: fadeUpGlass 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.3s;
            transition: transform 0.1s ease-out; /* Para o Parallax 3D */
        }

        /* Tipografia */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        h1 {
            color: var(--text-light);
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        h1 span {
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* --- BOTÃO DE ALTA CONVERSÃO --- */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            background: var(--text-light);
            color: #000;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
            background: var(--primary);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        /* --- ANIMAÇÕES KEYFRAMES --- */
        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        @keyframes fadeUpGlass {
            0% { 
                opacity: 0; 
                transform: translateY(40px) scale(0.95); 
                filter: blur(10px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 { font-size: 2.4rem; }
            .glass-card { padding: 3rem 2rem; width: 95%; }
        }
    </style>
</head>
<body>

    <!-- Fundo Sutil -->
    <div class="bg-container" id="bg-parallax">
        <div class="bg-image"></div>
    </div>
    <div class="bg-overlay"></div>

    <!-- Conteúdo Principal -->
    <main class="hero-section">
        <div class="glass-card" id="glass-card">
            <div class="badge">Acesso Exclusivo</div>
            <h1>Descubra o <span>Extraordinário.</span></h1>
            <p>Uma experiência imersiva projetada para impressionar. Sem distrações, apenas foco naquilo que realmente importa para o seu resultado.</p>
            <a href="#" class="cta-button">Desbloquear Agora</a>
        </div>
    </main>

    <!-- Script de Inovação: Efeito Parallax 3D suave com o movimento do mouse -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bg = document.getElementById('bg-parallax');
            const card = document.getElementById('glass-card');
            
            // Verifica se não é dispositivo móvel para aplicar o efeito
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                    
                    // Move o fundo sutilmente na direção oposta
                    bg.style.transform = `translate(${xAxis * 0.5}px, ${yAxis * 0.5}px)`;
                    
                    // Inclina o cartão de vidro sutilmente para dar efeito 3D
                    // Usamos transform base além do rotateX/Y para não sobrescrever a animação de entrada
                    const baseTransform = "translateY(0) scale(1)";
                    card.style.transform = `${baseTransform} rotateY(${xAxis * -0.5}deg) rotateX(${yAxis * 0.5}deg)`;
                });

                // Reseta a rotação quando o mouse sai da tela
                document.addEventListener('mouseleave', () => {
                    bg.style.transform = `translate(0px, 0px)`;
                    card.style.transform = `translateY(0) scale(1) rotateY(0deg) rotateX(0deg)`;
                });
            }
        });
    </script>

</body>
</html>
